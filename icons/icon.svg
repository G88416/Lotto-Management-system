<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Lottery ball symbol -->
  <circle cx="256" cy="230" r="120" fill="none" stroke="#ffffff" stroke-width="18" opacity="0.95"/>

  <!-- Horizontal stripe across ball -->
  <path d="M136 230 Q186 200 256 230 Q326 260 376 230" fill="none" stroke="#ffffff" stroke-width="14" opacity="0.7"/>

  <!-- "L" letter centred in ball -->
  <text x="256" y="252" font-family="Arial, sans-serif" font-size="96" font-weight="bold"
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle" opacity="0.95">L</text>

  <!-- Stars / ticket dots below -->
  <circle cx="176" cy="400" r="14" fill="#ffffff" opacity="0.85"/>
  <circle cx="220" cy="400" r="14" fill="#ffffff" opacity="0.85"/>
  <circle cx="264" cy="400" r="14" fill="#ffffff" opacity="0.85"/>
  <circle cx="308" cy="400" r="14" fill="#ffffff" opacity="0.85"/>
  <circle cx="352" cy="400" r="14" fill="#ffffff" opacity="0.85"/>

  <!-- "LOTTO" label arc hint — simple bar -->
  <rect x="160" y="360" width="200" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
</svg>
